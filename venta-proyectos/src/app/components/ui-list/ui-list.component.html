<ion-list>
  <ion-item *ngFor="let item of datos">
    <ion-label>
      <h2>{{ item.nombres }} {{ item.apellidos }}</h2>
      
      <p *ngIf="tipo === 'vendedor'">Proyecto: {{ item.proyecto }} - ${{ item.precio }}</p>
      
      <p *ngIf="tipo === 'comprador' && item.cedula">C.I: {{ item.cedula }}</p>
    </ion-label>
    
    <ion-buttons slot="end">
      <ion-button color="primary" (click)="editar(item)">
        <ion-icon name="create-outline"></ion-icon>
      </ion-button>
      <ion-button color="danger" (click)="eliminar(item.id)">
        <ion-icon name="trash-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-item>
  
  <ion-item *ngIf="datos.length === 0">
    <ion-label class="ion-text-center">No hay registros para mostrar</ion-label>
  </ion-item>
</ion-list>

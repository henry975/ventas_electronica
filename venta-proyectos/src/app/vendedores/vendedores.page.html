<ion-header>
  <ion-toolbar color="secondary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Vendedores</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="alternarVista()">
        <ion-icon slot="start" name="list-outline"></ion-icon>
        DATOS
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="!vistaDatos">
    <h2 style="text-align: center;">{{ modoEdicion ? 'Editar Vendedor' : 'Registro de Vendedor' }}</h2>
    <ion-list>
      <ion-item>
        <ion-input label="Nombres" labelPlacement="floating" type="text" [(ngModel)]="vendedor.nombres"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Apellidos" labelPlacement="floating" type="text" [(ngModel)]="vendedor.apellidos"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Proyecto" labelPlacement="floating" type="text" [(ngModel)]="vendedor.proyecto"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Precio ($)" labelPlacement="floating" type="number" [(ngModel)]="vendedor.precio"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Domicilio" labelPlacement="floating" type="text" [(ngModel)]="vendedor.domicilio"></ion-input>
      </ion-item>
    </ion-list>
    <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
      <ion-button expand="block" color="success" (click)="guardar()">
        <ion-icon slot="start" name="save-outline"></ion-icon> GUARDAR
      </ion-button>
      <ion-button *ngIf="modoEdicion" expand="block" color="medium" (click)="cancelarEdicion()">
        <ion-icon slot="start" name="close-outline"></ion-icon> CANCELAR
      </ion-button>
    </div>
  </div>

  <div *ngIf="vistaDatos">
    
<ion-item lines="none" style="margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px;">
      <ion-input 
        placeholder="Buscar nombre, apellido o proyecto..." 
        [(ngModel)]="terminoBusqueda" 
        (ngModelChange)="buscar()">
      </ion-input>
      
      <ion-button slot="end" fill="clear" (click)="buscar()">
        <ion-icon name="search-outline"></ion-icon>
      </ion-button>
    </ion-item>
    <ion-list>
      <ion-item *ngFor="let item of listaFiltrada">
        <ion-label>
          <h2>{{ item.nombres }} {{ item.apellidos }}</h2>
          <p>Proyecto: {{ item.proyecto }} - ${{ item.precio }}</p>
        </ion-label>
        <ion-buttons slot="end">
          <ion-button color="primary" (click)="prepararEdicion(item)">
            <ion-icon name="create-outline"></ion-icon>
          </ion-button>
          <ion-button color="danger" (click)="confirmarEliminacion(item.id!)">
            <ion-icon name="trash-outline"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-item>
      
      <ion-item *ngIf="listaFiltrada.length === 0">
        <ion-label class="ion-text-center">No hay registros para mostrar</ion-label>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
